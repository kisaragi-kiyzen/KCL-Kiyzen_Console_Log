<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    

    <title>KCL - Kiyzen Console Log</title>

    <link rel="icon" href="https://www.image2url.com/r2/default/images/1783816579910-5e05edca-7252-4942-a359-448906c63796.jpg">
    <link rel="shortcut icon" href="https://www.image2url.com/r2/default/images/1783816579910-5e05edca-7252-4942-a359-448906c63796.jpg">
    <link rel="apple-touch-icon" href="https://www.image2url.com/r2/default/images/1783816579910-5e05edca-7252-4942-a359-448906c63796.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@100..800&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">

    <style>
:root{
    --bg:#0b0b12;
    --panel:#151520;
    --panel2:#1b1b28;
    --border:#2c2c3f;
    --text:#f4f4f5;
    --muted:#8e8ea0;
    --purple:#9b5cff;
    --purple2:#7a42ff;
    --green:#37d67a;
    --red:#ff5f57;
    --yellow:#febc2e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Inter,"Segoe UI",sans-serif;
    padding:24px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
}

h1{
    font-family: "Space Grotesk", sans-serif;
    font-size:32px;
    font-weight:700;
    color:#fff;
}

.subtitle{
    color:var(--muted);
    margin-top:4px;
    font-size:14px;
}

.live{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(55,214,122,.12);
    color:var(--green);
    border:1px solid rgba(55,214,122,.25);
    border-radius:999px;
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
}

.live-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 0 12px var(--green);
    animation:pulse 1.4s infinite;
}

.console{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(122,66,255,.12);
}

.console-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 18px;
    background:var(--panel2);
    border-bottom:1px solid var(--border);
}

.console-title{
    display:flex;
    align-items:center;
    gap:8px;
}

.circle{
    width:12px;
    height:12px;
    border-radius:50%;
}

.red{
    background:var(--red);
}

.yellow{
    background:var(--yellow);
}

.green{
    background:var(--green);
}

.title{
    margin-left:10px;
    color:#ddd;
    font-weight:600;
}

.count{
    font-family:"JetBrains Mono","Fira Code","Consolas",monospace;
    color:var(--muted);
    font-size:13px;
}

.console-body{
    height:80vh;
    overflow-y:auto;
    font-family:"JetBrains Mono","Fira Code","Consolas",monospace;
}

.console-body::-webkit-scrollbar{
    width:8px;
}

.console-body::-webkit-scrollbar-thumb{
    background:var(--purple);
    border-radius:1px;
}

.log-item{
    display:grid;
    grid-template-columns:90px 1fr;
    gap:18px;
    padding:15px 20px;
    border-bottom:1px solid rgba(255,255,255,.05);
    transition:.2s;
    animation:fade .2s ease;
}

.log-item:hover{
    background:rgba(155,92,255,.08);
}

.timestamp{
    color:var(--muted);
    user-select:none;
}

.message{
    color:var(--text);
    white-space:pre-wrap;
    word-break:break-word;
}

.loading,
.empty,
.error{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100%;
    color:var(--muted);
}

.error{
    color:#ff6b81;
}

@keyframes pulse{
    50%{
        opacity:.4;
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(6px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:700px){

    body{
        padding:15px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .log-item{
        grid-template-columns:1fr;
        gap:6px;
    }

    .console-body{
        height:70vh;
    }

}
    </style>
</head>
<body>

    <main class="container">

        <header class="header">
            <div>
                <h1>Kiyzen Console</h1>
            </div>

        </header>

        <section class="console">

            <div class="console-top">
                <div class="console-title">
                    <span class="circle red"></span>
                    <span class="circle yellow"></span>
                    <span class="circle green"></span>

                </div>

                <div class="count">
                    <span id="totalLog">0</span> Logs
                </div>
            </div>

            <div id="logBox" class="console-body">

                <div class="loading">
                    Loading console...
                </div>

            </div>

        </section>

    </main>

    <script>
const logBox = document.getElementById("logBox");
const totalLog = document.getElementById("totalLog");

let lastData = "";

async function ambilData() {
    try {
        const response = await fetch("/api/data");

        if (!response.ok) {
            throw new Error("Server Error");
        }

        const data = await response.json();

        const current = JSON.stringify(data);

        // Tidak render ulang kalau data belum berubah
        if (current === lastData) return;

        lastData = current;

        if (!Array.isArray(data) || data.length === 0) {
            totalLog.textContent = "0";
            logBox.innerHTML = `
                <div class="empty">
                    Belum ada log...
                </div>
            `;
            return;
        }

        totalLog.textContent = data.length;

        const scrollBottom =
            logBox.scrollHeight - logBox.scrollTop <=
            logBox.clientHeight + 20;

        logBox.innerHTML = "";

        [...data].reverse().forEach(item => {

            const row = document.createElement("div");
            row.className = "log-item";

            row.innerHTML = `
                <span class="timestamp">${item.waktu}</span>
                <span class="message">${escapeHtml(item.pesan)}</span>
            `;

            logBox.appendChild(row);

        });

        if (scrollBottom) {
            logBox.scrollTop = logBox.scrollHeight;
        }

    } catch (err) {

        logBox.innerHTML = `
            <div class="error">
                Gagal terhubung ke server.
            </div>
        `;

        console.error(err);
    }
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

// Pertama kali
ambilData();

// Refresh tiap 1 detik
setInterval(ambilData, 1000);
    </script>

</body>
</html>
